name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-pr-body:
    name: Validate runtime-first PR body
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Validate runtime-first PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" > /tmp/pr_body.md
          python scripts/validate_runtime_first_pr_body.py /tmp/pr_body.md

  tests:
    name: pytest
    needs: [validate-pr-body]
    if: always() && (github.event_name == 'push' || needs.validate-pr-body.result == 'success')
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package with dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest
