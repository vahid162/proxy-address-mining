server:
  name: farm-new-1
  timezone: Europe/Berlin

paths:
  app: /opt/mpf-py
  data: /var/lib/mpf
  logs: /var/log/mpf
  backups: /var/backups/mpf

database:
  url: postgresql:///mpf

firewall:
  backend: iptables
  apply_mode: plan_only
  lock_path: /run/mpf-firewall.lock

proxy:
  compose_file: compose/mpf-proxy.compose.yaml
  project_name: mpf-proxy
  runtime_activation_allowed: false

v2raya:
  ui_bind_host: 127.0.0.1
  ui_port: 2014

lanes:
  btc:
    enabled: true
    backend_port: 60010
    chain_prefix: MPFBTC
    forwarder:
      service_name: mpf-forwarder-btc
      bind_host: 127.0.0.1
      listen_port: 60010
      upstream_socks: v2raya:22070
    upstreams:
      - host: bitcoin.viabtc.io
        port: 3333

  zec:
    enabled: false
    backend_port: 60015
    chain_prefix: MPFZEC
    upstreams: []

  ltc:
    enabled: false
    backend_port: 60020
    chain_prefix: MPFLTC
    upstreams: []

abuse:
  enabled: true
  threshold_sec: 3600
  grace_sec: 900
