# Phase 4.1 planning template only.
# This file is safe to validate with `docker compose config`.
# Do not start this Compose project until a separate Phase 4 runtime activation task is accepted.

name: mpf-proxy

services:
  mpf-v2raya:
    image: ${MPF_V2RAYA_IMAGE:-mzz2017/v2raya:latest}
    container_name: mpf-v2raya
    profiles:
      - phase4-runtime
    restart: unless-stopped
    environment:
      V2RAYA_LOG_FILE: /tmp/v2raya.log
    ports:
      # v2rayA UI must remain local-only.
      # Host/operator port is 2015; container v2rayA UI is 2017 for this image.
      - "127.0.0.1:2015:2017"
    expose:
      - "20170"
    volumes:
      - mpf-v2raya-data:/etc/v2raya
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2017 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mpf-proxy-internal

  mpf-forwarder-btc:
    image: ${MPF_FORWARDER_IMAGE:-ginuerzh/gost:latest}
    container_name: mpf-forwarder-btc
    profiles:
      - phase4-runtime
    restart: unless-stopped
    depends_on:
      mpf-v2raya:
        condition: service_started
    command:
      - "-L=tcp://:60010/${MPF_BTC_POOL_HOST:-bitcoin.viabtc.io}:${MPF_BTC_POOL_PORT:-3333}"
      - "-F=socks5://mpf-v2raya:20170"
    ports:
      # BTC backend is local-only. It must never be published on 0.0.0.0.
      - "127.0.0.1:60010:60010"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 60010 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mpf-proxy-internal

networks:
  mpf-proxy-internal:
    name: mpf-proxy-internal
    driver: bridge

volumes:
  mpf-v2raya-data:
    name: mpf-v2raya-data
